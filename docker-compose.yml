version: '3.8'

services:
  aether-engine:
    build: 
      context: .
      dockerfile: packages/aether-core/Dockerfile
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    restart: always

  # Optional: Redis for high-speed caching
  aether-cache:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: aether-network
